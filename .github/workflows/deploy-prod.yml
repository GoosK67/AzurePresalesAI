name: Deploy PROD (gated)

on:
  workflow_dispatch:
    inputs:
      resourceGroup:
        description: 'Doel-RG (bv. rg-ai-foundry-prod)'
        required: true
        default: 'rg-ai-foundry-prod'
      location:
        description: 'Azure regio'
        required: true
        default: 'westeurope'

permissions:
  id-token: write
  contents: read

concurrency:
  group: prod-deploy
  cancel-in-progress: false

env:
  TEMPLATE: infra/azure-ai-platform/platform.bicep
  PARAMS: infra/azure-ai-platform/parameters.json

jobs:
  prod-guard:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure CLI (incl. bicep)
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          az bicep install

      - name: Create/ensure RG
        run: az group create -n "${{ github.event.inputs.resourceGroup }}" -l "${{ github.event.inputs.location }}"

      - name: What-if (PROD)
        run: |
          az deployment group what-if \
            --resource-group "${{ github.event.inputs.resourceGroup }}" \
            --template-file "${{ env.TEMPLATE }}" \
            --parameters @"${{ env.PARAMS }}"

      - name: Deploy (PROD)
        run: |
          az deployment group create \
            --resource-group "${{ github.event.inputs.resourceGroup }}" \
            --template-file "${{ env.TEMPLATE }}" \
            --parameters @"${{ env.PARAMS }}"

