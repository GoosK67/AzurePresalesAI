
name: Deploy PROD (manual)
on:
  workflow_dispatch:
    inputs:
      resourceGroup:
        description: 'Target resource group'
        required: true
        default: 'rg-ai-foundry-prod'
      location:
        description: 'Azure region'
        required: true
        default: 'westeurope'
permissions:
  id-token: write
  contents: read
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy Bicep to RG
        working-directory: infra/azure-ai-platform
        run: |
          az group create -n "${{ github.event.inputs.resourceGroup }}" -l "${{ github.event.inputs.location }}"
          az deployment group create             --resource-group "${{ github.event.inputs.resourceGroup }}"             --template-file platform.bicep             --parameters @parameters.json
