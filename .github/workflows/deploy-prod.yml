name: Deploy PROD

on:
  workflow_dispatch:
    inputs:
      resourceGroup:
        description: 'Prod Resource Group'
        required: true
        default: 'rg-ai-foundry-prod'
      location:
        description: 'Azure region'
        required: true
        default: 'westeurope'

permissions:
  id-token: write
  contents: read

concurrency:
  group: prod-deploy
  cancel-in-progress: false

env:
  TEMPLATE: infra/azure-ai-platform/platform.bicep
  PARAMS: infra/azure-ai-platform/parameters.json

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure CLI + Bicep
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          az bicep install

      - name: What-if PROD
        run: |
          az deployment group what-if \
            --resource-group "${{ github.event.inputs.resourceGroup }}" \
            --template-file "${{ env.TEMPLATE }}" \
            --parameters @"${{ env.PARAMS }}"

      - name: Deploy PROD
        run: |
          az deployment group create \
            --resource-group "${{ github.event.inputs.resourceGroup }}" \
            --template-file "${{ env.TEMPLATE }}" \
            --parameters @"${{ env.PARAMS }}"

