
name: Weekly Workshop Reminder
on:
  schedule:
    - cron: '0 7 * * 3'  # Every Wednesday 07:00 UTC (~08:00 CET/CEST)
  workflow_dispatch:
permissions:
  contents: read
  issues: write
jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create weekly workshop issue
        uses: actions/github-script@v8
        with:
          script: |
            const title = `Weekly Workshop – ${new Date().toISOString().slice(0,10)}`;
            const body = require('fs').readFileSync('docs/workshops/agenda.md','utf8');
            const res = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['workshop','needs-planning']
            });
            core.setOutput('issue', res.data.html_url);
