name: Auto-add issues (GraphQL)
on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: read

jobs:
  add:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve project nodeId
        id: pid
        env:
          OWNER: GoosK67
          REPO: AzurePresalesAI
          NUMBER: 1
          GITHUB_TOKEN: ${{ secrets.PAT_PROJECT_V2 }}   # PAT met 'project' scope
        run: |
          gh auth status || gh auth login --scopes "project"
          nodeId=$(gh api graphql -f query='
            query($owner:String!, $repo:String!, $number:Int!){
              repository(owner:$owner, name:$repo){
                projectV2(number:$number){ id }
              }}' -f owner=$OWNER -f repo=$REPO -F number=$NUMBER --jq '.data.repository.projectV2.id')
          echo "nodeId=$nodeId" >> $GITHUB_OUTPUT

      - name: Add issue to ProjectV2 by nodeId
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_PROJECT_V2 }}
          script: |
            const projectId = "${{ steps.pid.outputs.nodeId }}";
            const issueId   = context.payload.issue.node_id;
            const q = `mutation($projectId:ID!, $contentId:ID!){
              addProjectV2ItemById(input:{projectId:$projectId, contentId:$contentId}){
                item { id }
              }
            }`;
            const r = await github.graphql(q, { projectId, contentId: issueId });
            core.info(`Added. Item: ${r.addProjectV2ItemById.item.id}`);
            