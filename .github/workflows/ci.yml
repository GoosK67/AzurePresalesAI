
name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
permissions:
  contents: read
  id-token: write
  pull-requests: write
jobs:
  build-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Azure CLI
        uses: azure/cli@v2
      - name: Validate Bicep (build)
        run: az bicep version || az bicep install
      - name: Validate Bicep (build)
        working-directory: cegeka-ai-platform-github/infra/azure-ai-platform
        run: az bicep build --file platform.bicep
      - name: Comment success on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Bicep build succeeded in CI.'
            })
