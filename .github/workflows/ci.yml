name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  build-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install Bicep (correct Azure action)
      - name: Setup Bicep
        uses: Azure/setup-bicep@v1

      - name: Check Bicep version
        run: bicep --version

      # Validate platform.bicep
      - name: Build platform.bicep
        working-directory: infra/azure-ai-platform
        run: bicep build platform.bicep

      # Validate all modules
      - name: Build modules
        working-directory: infra/azure-ai-platform/modules
        run: |
          for f in *.bicep; do
            echo "Building $f"
            bicep build "$f"
          done

      - name: Comment success on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Bicep build succeeded in CI.'
            })
