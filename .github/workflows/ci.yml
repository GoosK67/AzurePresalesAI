name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  build-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install Azure CLI + Bicep
      - name: Install Azure CLI + Bicep
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          az bicep install
          az version
          bicep --version

      - name: Build platform.bicep
        working-directory: infra/azure-ai-platform
        run: bicep build platform.bicep

      - name: Build all modules
        working-directory: infra/azure-ai-platform/modules
        run: |
          for f in *.bicep; do
            echo "Building $f"
            bicep build "$f"
          done

      - name: Comment success on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Bicep build succeeded in CI.'
            })